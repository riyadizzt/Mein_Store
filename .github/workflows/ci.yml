name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9.0.0'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint API
        run: pnpm --filter api lint
        continue-on-error: true

      - name: Lint Web
        run: pnpm --filter web lint
        continue-on-error: true

      - name: Typecheck API
        run: pnpm --filter api exec tsc --noEmit

      - name: Typecheck Web
        run: pnpm --filter web exec tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9.0.0'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run unit tests
        run: cd apps/api && npx jest src/modules/orders/tax-calculation.spec.ts --no-cache --config package.json

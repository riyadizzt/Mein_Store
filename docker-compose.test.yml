version: '3.8'

# Isolierte PostgreSQL-Instanz für Integration- und Concurrency-Tests
# Startet auf Port 5433 (kein Konflikt mit lokaler PG auf 5432)

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: omnichannel_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_test
    ports:
      - "5433:5432"
    # tmpfs: In-Memory — schnellste Option, kein Disk-I/O
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d omnichannel_test"]
      interval: 5s
      timeout: 5s
      retries: 5
